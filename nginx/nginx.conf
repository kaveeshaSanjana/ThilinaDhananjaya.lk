events {
    worker_connections 256;  # More than enough for 20 concurrent users
}

http {
    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Rate limiting (protect against abuse) ────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream services ────────────────────────────────────────────
    upstream backend {
        server backend:8080;
        keepalive 16;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS (uncomment after adding SSL certs)
        # return 301 https://$host$request_uri;

        # ── API proxy ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── Frontend static ───────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }

    # ── HTTPS server (uncomment and configure after obtaining SSL cert) ─
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     location /api/ { ... same as above ... }
    #     location /     { ... same as above ... }
    # }
}
